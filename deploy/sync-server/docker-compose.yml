services:
  notedock-sync:
    build:
      context: ../..
      dockerfile: Dockerfile.sync-server
    image: notedock-sync-server:latest
    container_name: notedock-sync
    restart: unless-stopped
    environment:
      NOTEDOCK_ADMIN_PASSWORD: ${NOTEDOCK_ADMIN_PASSWORD:?Set NOTEDOCK_ADMIN_PASSWORD in deploy/sync-server/.env}
      NOTEDOCK_ADMIN_USERNAME: ${NOTEDOCK_ADMIN_USERNAME:?Set NOTEDOCK_ADMIN_USERNAME in deploy/sync-server/.env}
      NOTEDOCK_ALLOW_WEAK_SYNC_PASSWORD: ${NOTEDOCK_ALLOW_WEAK_SYNC_PASSWORD:-0}
      NOTEDOCK_SYNC_DATA_DIR: /data
      NOTEDOCK_SYNC_PORT: 47831
      NOTEDOCK_SYNC_TOKEN: ${NOTEDOCK_SYNC_TOKEN:-}
    ports:
      - "${NOTEDOCK_SYNC_BIND:-127.0.0.1}:47831:47831"
    volumes:
      - type: bind
        source: ${NOTEDOCK_SYNC_DATA_DIR:-./data}
        target: /data
